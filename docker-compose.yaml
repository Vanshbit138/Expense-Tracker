services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: expense-tracker-db
    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expense-tracker-network

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-api
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://expense_user:expense_password@postgres:5432/expense_tracker
      DATABASE_URL_TEST: postgresql://expense_user:expense_password@postgres:5432/expense_tracker_test
      
      # JWT Configuration
      SECRET_KEY: your-super-secret-jwt-key-change-in-production-32-chars-minimum
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      
      # Application Configuration
      DEBUG: "false"
      LOG_LEVEL: INFO
      ENABLE_JSON_LOGGING: "true"
      
      # CORS Configuration
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080","http://localhost:8000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - expense-tracker-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  expense-tracker-network:
    driver: bridge
